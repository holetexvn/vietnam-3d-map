<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Việt Nam 3D — Chạm vào một dải non sông</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230A1420'/%3E%3Cpath fill='%23FFCD00' d='M32 12l4.7 14.4h15.1l-12.2 8.9 4.6 14.4L32 40.8l-12.2 8.9 4.6-14.4-12.2-8.9h15.1z'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,800;1,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.js" } }
  </script>
</head>
<body>
  <div id="app"></div>

  <header class="masthead">
    <p class="eyebrow">Bản đồ 34 tỉnh, thành · 2025</p>
    <h1>VIỆT&nbsp;NAM</h1>
    <p class="sub">Chạm vào một dải non sông</p>
  </header>

  <aside class="card" id="card" aria-live="polite">
    <p class="card-type" id="card-type"></p>
    <h2 class="card-name" id="card-name"></h2>
    <div class="card-landmark">
      <span class="card-landmark-icon">◆</span>
      <div>
        <p class="card-landmark-title" id="card-landmark"></p>
        <p class="card-landmark-desc" id="card-desc"></p>
      </div>
    </div>
    <div class="card-facts">
      <span id="card-merged"></span>
      <span id="card-stats"></span>
    </div>
  </aside>

  <p class="hint" id="hint">Rê chuột qua từng tỉnh · kéo để xoay, lăn để thu phóng · nhấp để bay tới gần</p>

  <div class="loader" id="loader"><span>Đang dựng non sông…</span></div>

  <script type="module" src="main.js"></script>
</body>
</html>
